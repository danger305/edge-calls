name: 📈 Update Daily Picks

# ─── WHEN TO RUN ─────────────────────────────────────────────────
on:
  schedule:
    # 8:30 AM Eastern Time = 13:30 UTC  (Mon–Fri only)
    - cron: '30 13 * * 1-5'

  # Also allows you to click "Run workflow" manually from GitHub UI
  workflow_dispatch:

# ─── JOB ─────────────────────────────────────────────────────────
jobs:
  update-picks:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push the updated index.html

    steps:
      # 1. Check out your repo
      - name: ⬇️  Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: 🐍  Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install required libraries
      - name: 📦  Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy pytz

      # 4. Run the pick generator — updates index.html in place
      - name: 🔍  Scan market & generate picks
        run: python generate_picks.py

      # 5. Commit & push the updated site
      - name: 🚀  Commit & deploy updated picks
        run: |
          git config user.name  "Edge Calls Bot"
          git config user.email "bot@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to picks today — skipping commit."
          else
            git commit -m "📈 Auto-update picks — $(TZ='America/New_York' date '+%a %b %d %Y %I:%M %p ET')"
            git push
          fi
